kind = "web"
previewPath = "/"
title = "PersonaHub"
version = "1.0.0"
id = "artifacts/persona-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25810

[services.development]
run = "pnpm --filter @workspace/persona-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/persona-hub", "run", "build" ]
publicDir = "artifacts/persona-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25810"
BASE_PATH = "/"
