<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:320px; max-height:560px; overflow-y:auto; padding:20px; font-family:'Segoe UI',system-ui,sans-serif; background:#F8F7F4; color:#1A1A1A; }
  .header { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid #E6E3DC; }
  .logo { width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#1A1A1A,#444);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:800; }
  h2 { font-size:15px; font-weight:700; }
  label { display:block; font-size:11px; font-weight:600; color:#9E9890; text-transform:uppercase; letter-spacing:0.5px; margin:12px 0 5px; }
  input { width:100%; padding:9px 12px; border:1px solid #E6E3DC; border-radius:9px; font-size:12.5px; font-family:monospace; background:white; outline:none; }
  input:focus { border-color:#D4380D; }
  .btn { margin-top:14px; padding:9px 18px; background:#1A1A1A; color:white; border:none; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn:hover { background:#333; }
  .status { margin-top:10px; font-size:11.5px; padding:8px 12px; border-radius:8px; }
  .status.ok { background:#F0FDF4; color:#15803D; }
  .status.err { background:#FFF1EC; color:#D4380D; }
  .hint { margin-top:14px; padding-top:12px; border-top:1px solid #E6E3DC; font-size:11px; color:#9E9890; line-height:1.5; }
  a { color:#D4380D; }

  /* Action section — shown when selected text is available */
  #action-section { display:none; margin-bottom:14px; padding:12px 14px; background:white; border:1.5px solid #E6E3DC; border-radius:12px; }
  #action-section.visible { display:block; }
  .action-label { font-size:11px; font-weight:600; color:#9E9890; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .action-text { font-size:12px; color:#6B6560; line-height:1.5; margin-bottom:10px; max-height:90px; overflow-y:auto; }
  .persona-select { width:100%; padding:7px 10px; border:1px solid #E6E3DC; border-radius:8px; font-size:12px; font-family:inherit; background:white; margin-bottom:10px; outline:none; }
  .action-btn { width:100%; padding:9px 10px; border:none; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity 0.15s; background:#15803D; color:white; }
  .action-btn:hover { opacity:0.85; }
  .action-status { margin-top:8px; font-size:11.5px; padding:7px 10px; border-radius:8px; display:none; }
  .action-status.ok { background:#F0FDF4; color:#15803D; display:block; }
  .action-status.err { background:#FFF1EC; color:#D4380D; display:block; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <h2>PersonaHub</h2>
  </div>

  <!-- Quick action section (visible when text was highlighted via context menu) -->
  <div id="action-section">
    <div class="action-label">Выделенный текст</div>
    <div class="action-text" id="action-text"></div>
    <select class="persona-select" id="action-persona"></select>
    <button class="action-btn" id="btn-context">📌 Добавить в контекст</button>
    <div class="action-status" id="action-status"></div>
  </div>

  <label>URL сайта</label>
  <input id="base" placeholder="https://synthpersonahub.replit.app" />

  <label>API Secret</label>
  <input id="secret" type="password" placeholder="ваш секретный ключ" />

  <button class="btn" id="save">Сохранить и проверить</button>
  <div id="status"></div>

  <div class="hint">
    <strong>Как использовать:</strong><br>
    Выделите текст на любой странице → ПКМ →<br>
    🗣 Спросить мнение персоны<br>
    📌 Добавить в контекст персоны<br><br>
    <a href="https://synthpersonahub.replit.app" target="_blank">Открыть PersonaHub →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
